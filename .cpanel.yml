---
# cPanel Git Version Control deploy script.
# Self-contained layout: the entire repo IS the deploy unit. Doc root for
# the domain points directly into public_html/ inside this repo, so no file
# copying is needed. The only deploy task is running migrations to apply
# any new SQL files.
#
# .env must be uploaded ONCE manually to public_html/.env on the server
# and is never overwritten by deploys.
deployment:
  tasks:
    - /usr/local/bin/ea-php83 public_html/scripts/migrate.php
