---
# cPanel Git Version Control deploy script.
# Self-contained layout: the entire repo IS the deploy unit. Doc root for
# the domain points directly into site/public/ inside this repo, so no
# file copying is needed. The only deploy task is running migrations.
#
# .env must be uploaded ONCE manually to the repo root and is never
# overwritten by deploys. Each site = own clone of this repo.
deployment:
  tasks:
    - /usr/local/bin/ea-php83 core/scripts/migrate.php
